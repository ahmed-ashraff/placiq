<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placiq — Join the Waitlist</title>
    <link rel="icon" type="image/svg+xml" href="assets/onBlackLogo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/waitlist.css" />
  </head>
  <body>
    <div class="waitlist-page">
      <div class="waitlist-card" id="waitlistCard">
        <div class="waitlist-logo">
          <a href="index.html">
            <img
              src="assets/onBlackLogo.svg"
              alt="Placiq Logo"
              class="logo-icon"
            />
            <span class="q">Placi</span><span class="m">Q</span>
          </a>
        </div>

        <!-- FORM STATE -->
        <div id="formState">
          <div class="waitlist-heading">Get early access</div>
          <p class="waitlist-sub">We'll notify you when Placiq is ready.</p>
          <form class="waitlist-form" id="waitlistForm">
            <input
              type="email"
              class="waitlist-input"
              id="emailInput"
              placeholder="you@email.com"
              required
              autocomplete="email"
            />
            <button type="submit" class="waitlist-btn" id="submitBtn">
              Notify me
            </button>
          </form>
          <div class="waitlist-error" id="errorMsg"></div>
        </div>

        <!-- SUCCESS STATE (hidden by default) -->
        <div id="successState" style="display: none" class="waitlist-success">
          <div class="success-icon">✓</div>
          <div class="success-heading">Thank you!</div>
          <p class="success-sub">You're on the list. We'll reach out soon.</p>
          <a href="index.html" class="back-link">← Back to Placiq</a>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/waitlist.js"></script>
  </body>
</html>
